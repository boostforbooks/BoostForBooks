<!DOCTYPE html>
<html lang="en">
<head>
    <title> Boost for Books </title>




<style>
    html{
        background-color: rgb(178, 217, 233);

    }

header{
    gap: 20px;

}

    }

     background-color: rgb(178, 217, 233);
     height: 83px;
     margin: auto;
    
    }

    .about_the_editors{
     background-color: rgb(178, 217, 233);
    height: 83px;
    margin: auto;
    }
    
    .links1{
     background-color: rgb(178, 217, 233);
    height: 83px;
    margin: auto;
    }
    .box2
    {display: grid;
     grid-template-columns: 1fr 1fr 1fr;
     background-color: white;
     height: 250px;
    }

    .box3
    {display: grid;
     grid-template-columns: 1fr 1fr 1fr;
     background-color: white;
     height: 250px;
    }




</style>
</head>
<body>

<header>
    <div class="header"> Boost for Books</div>

</header>
<main>

<footer></footer>
